name: Build and Push Next.js Docker Image

on:
  release:
    types: [published]   # Trigger saat ada release baru

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # Checkout kode
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup Docker Buildx (untuk build modern/multi-platform)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Login ke Docker Hub pakai secrets
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      # --- STEP DIAGNOSA (Tambahkan ini untuk memastikan secret 'tembus') ---
      - name: Verify Secrets
        run: |
          echo "Checking secrets availability..."
          [ -z "${{ secrets.GROQ_API_KEY }}" ] && echo "❌ GROQ_API_KEY IS EMPTY" || echo "✅ GROQ_API_KEY IS SET"
          [ -z "${{ secrets.GEMINI_API_KEY }}" ] && echo "❌ GEMINI_API_KEY IS EMPTY" || echo "✅ GEMINI_API_KEY IS SET"

      # Build & Push image Next.js
      - name: Build and push multi platform image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            bilbis/vest-ai:${{ github.ref_name }}
            bilbis/vest-ai:latest
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            OPEN_ROUTER_API=${{ secrets.OPEN_ROUTER_API }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
