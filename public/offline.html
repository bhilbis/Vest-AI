<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#09090B" />
    <title>No Connection — Financial Tracker</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background-color: #09090B;
        color: #fafafa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: max(env(safe-area-inset-top), 24px) 24px max(env(safe-area-inset-bottom), 24px);
        text-align: center;
      }

      .icon {
        width: 64px;
        height: 64px;
        margin-bottom: 24px;
        opacity: 0.4;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
      }

      p {
        font-size: 0.875rem;
        color: #71717a;
        line-height: 1.6;
        max-width: 280px;
        margin-bottom: 32px;
      }

      button {
        background-color: #27272a;
        color: #fafafa;
        border: 1px solid #3f3f46;
        border-radius: 8px;
        padding: 10px 24px;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.15s;
        -webkit-tap-highlight-color: transparent;
      }

      button:hover { background-color: #3f3f46; }
      button:active { background-color: #52525b; }
    </style>
  </head>
  <body>
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>

    <h1>You're offline</h1>
    <p>Check your connection and try again. Your data is safe and will sync when you're back online.</p>

    <button onclick="window.location.reload()">Try again</button>
  </body>
</html>
